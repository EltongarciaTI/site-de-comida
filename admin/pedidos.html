<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedidos — Admin</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="admin-body">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar__brand">
      <span class="sidebar__logo" id="sLogo"></span>
      <div class="sidebar__brand-text">
        <span class="sidebar__brand-name" id="sNome"></span>
        <span class="sidebar__brand-tag">Painel Admin</span>
      </div>
    </div>

    <nav class="sidebar__nav">
      <span class="sidebar__section-label">Geral</span>
      <a class="sidebar__link" href="index.html">
        <span class="sidebar__link-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </span>
        Dashboard
      </a>
      <a class="sidebar__link active" href="pedidos.html">
        <span class="sidebar__link-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
        </span>
        Pedidos
        <span class="sidebar__badge" id="sidebarPending">0</span>
      </a>

      <span class="sidebar__section-label">Cardápio</span>
      <a class="sidebar__link" href="produtos.html">
        <span class="sidebar__link-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20"/><path d="M2 12h20"/></svg>
        </span>
        Produtos
      </a>
    </nav>

    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__user-avatar">A</div>
        <div>
          <div class="sidebar__user-name">Administrador</div>
          <div class="sidebar__user-role">Acesso total</div>
        </div>
      </div>
      <button class="sidebar__preview-btn" onclick="openPreview()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        Preview no celular
      </button>
      <a class="sidebar__link" href="../index.html" target="_blank">
        <span class="sidebar__link-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></span>
        Ver site
      </a>
      <button class="sidebar__link sidebar__logout" id="btnLogout">
        <span class="sidebar__link-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
        Sair
      </button>
    </div>
  </aside>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar__left">
      <div class="topbar__breadcrumb">
        <span>Admin</span>
        <span>/</span>
        <span class="topbar__breadcrumb-current">Pedidos</span>
      </div>
    </div>
    <div class="topbar__right">
      <button class="topbar__preview" onclick="openPreview()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        Preview Mobile
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <main class="admin-main">
    <div class="admin-content">

      <div class="admin-header">
        <div class="admin-header__left">
          <h1 class="admin-header__title">Pedidos</h1>
          <p class="admin-header__sub" id="headerSub">Carregando…</p>
        </div>
        <div class="admin-header__actions">
          <!-- Busca -->
          <div class="admin-search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Buscar cliente ou #pedido…" />
          </div>
          <!-- Filtro -->
          <select class="status-select" id="filterStatus" style="max-width:170px">
            <option value="all">Todos os status</option>
            <option value="pendente">⏳ Pendentes</option>
            <option value="preparando">👨‍🍳 Preparando</option>
            <option value="saiu">🛵 Saiu para entrega</option>
            <option value="entregue">✅ Entregues</option>
            <option value="cancelado">❌ Cancelados</option>
          </select>
          <button class="admin-btn admin-btn--danger" id="btnClearOrders">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            Limpar todos
          </button>
        </div>
      </div>

      <!-- TABELA -->
      <div class="admin-card">
        <div class="admin-card__header">
          <h2>Lista de pedidos</h2>
          <div class="admin-card__header-right">
            <span class="t-muted" id="countLabel" style="font-size:12px"></span>
          </div>
        </div>
        <div class="admin-table-wrap" id="ordersContainer">
          <div class="empty-admin">
            <div class="empty-admin__icon">📋</div>
            <div class="empty-admin__title">Nenhum pedido ainda</div>
            <div class="empty-admin__sub">Os pedidos feitos pelo site aparecerão aqui automaticamente.</div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- MODAL DETALHES -->
  <div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal()">
    <div class="modal modal--lg" onclick="event.stopPropagation()">
      <div class="modal__header">
        <div>
          <h3 id="modalTitle">Detalhes do Pedido</h3>
          <div class="modal__header-sub" id="modalSub"></div>
        </div>
        <button class="modal__close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal__body" id="modalBody"></div>
      <div class="modal__footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- PREVIEW MOBILE -->
  <div class="preview-overlay" id="previewOverlay">
    <div class="preview-phone">
      <iframe class="preview-phone__iframe" id="previewFrame" src="../index.html"></iframe>
    </div>
    <div class="preview-panel">
      <div class="preview-panel__title">📱 Preview Mobile</div>
      <button class="preview-nav-btn active" onclick="setPreview('../index.html', this)">🏠 Início</button>
      <button class="preview-nav-btn" onclick="setPreview('../menu.html', this)">🍕 Cardápio</button>
      <button class="preview-nav-btn" onclick="setPreview('../checkout.html', this)">🛒 Carrinho</button>
      <button class="preview-nav-btn" onclick="setPreview('../confirmacao.html', this)">✅ Confirmação</button>
      <button class="preview-close" onclick="closePreview()">✕ Fechar preview</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../js/config.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    adminGuard();
    document.getElementById("sLogo").textContent = CONFIG.emoji;
    document.getElementById("sNome").textContent  = CONFIG.nome;

    const STATUS_LABELS = {
      pendente:   "⏳ Pendente",
      preparando: "👨‍🍳 Preparando",
      saiu:       "🛵 Saiu",
      entregue:   "✅ Entregue",
      cancelado:  "❌ Cancelado",
    };

    let filterVal  = "all";
    let searchVal  = "";

    /* ── render ── */
    function renderOrders() {
      const orders   = DB.getOrders();
      const pending  = orders.filter(o => o.status === "pendente").length;
      document.getElementById("sidebarPending").textContent = pending;

      let filtered = orders;
      if (filterVal !== "all") filtered = filtered.filter(o => o.status === filterVal);
      if (searchVal) {
        const q = searchVal.toLowerCase();
        filtered = filtered.filter(o =>
          (o.cliente?.nome || "").toLowerCase().includes(q) ||
          String(o.id).slice(-6).includes(q)
        );
      }

      document.getElementById("headerSub").textContent =
        `${orders.length} pedido${orders.length !== 1 ? "s" : ""} no total · ${pending} pendente${pending !== 1 ? "s" : ""}`;
      document.getElementById("countLabel").textContent =
        `${filtered.length} resultado${filtered.length !== 1 ? "s" : ""}`;

      const container = document.getElementById("ordersContainer");

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-admin">
            <div class="empty-admin__icon">${filterVal !== "all" || searchVal ? "🔍" : "📋"}</div>
            <div class="empty-admin__title">${filterVal !== "all" || searchVal ? "Nenhum resultado" : "Nenhum pedido ainda"}</div>
            <div class="empty-admin__sub">${filterVal !== "all" || searchVal ? "Tente outro filtro ou termo de busca." : "Os pedidos feitos pelo site aparecerão aqui automaticamente."}</div>
          </div>`;
        return;
      }

      container.innerHTML = `
        <table class="admin-table">
          <thead><tr>
            <th>#</th>
            <th>Cliente</th>
            <th>Itens</th>
            <th>Total</th>
            <th>Pagamento</th>
            <th>Endereço</th>
            <th>Status</th>
            <th>Data</th>
            <th>Ações</th>
          </tr></thead>
          <tbody>
          ${filtered.map(o => `
            <tr>
              <td class="t-muted t-nowrap">#${String(o.id).slice(-6)}</td>
              <td>
                <div class="t-strong">${o.cliente?.nome || "—"}</div>
                <div class="t-muted">${o.cliente?.tel || ""}</div>
              </td>
              <td style="max-width:200px">
                ${(o.itens||[]).map(i =>
                  `<div style="line-height:1.7;font-size:12px">
                    <span style="color:#fff;font-weight:700">${i.qty}×</span> ${i.nome}
                    ${i.tamanhoLabel && i.tamanhoLabel !== "Único" ? `<span class="t-muted">(${i.tamanhoLabel})</span>` : ""}
                  </div>`
                ).join("")}
              </td>
              <td class="t-nowrap"><strong style="color:var(--adm-primary);font-size:15px">${formatBRL(o.total||0)}</strong></td>
              <td class="t-nowrap" style="font-size:12px">${o.pagamento?.label || "—"}</td>
              <td style="max-width:160px;font-size:11px;color:var(--adm-muted);line-height:1.4">${o.entrega?.endereco || "—"}</td>
              <td>${statusBadge(o.status)}</td>
              <td class="t-muted t-nowrap" style="font-size:11px">${formatDate(o.data)}</td>
              <td>
                <div style="display:flex;flex-direction:column;gap:5px">
                  <button class="admin-btn" onclick="openOrder(${o.id})">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    Ver detalhes
                  </button>
                  <select class="status-select" onchange="updateStatus(${o.id}, this.value); this.value=''">
                    <option value="">Mudar status…</option>
                    <option value="pendente">⏳ Pendente</option>
                    <option value="preparando">👨‍🍳 Preparando</option>
                    <option value="saiu">🛵 Saiu</option>
                    <option value="entregue">✅ Entregue</option>
                    <option value="cancelado">❌ Cancelado</option>
                  </select>
                </div>
              </td>
            </tr>`).join("")}
          </tbody>
        </table>`;
    }

    /* ── status update ── */
    function updateStatus(id, status) {
      if (!status) return;
      DB.updateOrderStatus(id, status);
      showToast("✅ Status atualizado!");
      renderOrders();
    }

    /* ── modal detalhes ── */
    function openOrder(id) {
      const o = DB.getOrders().find(o => o.id === id);
      if (!o) return;

      document.getElementById("modalTitle").textContent = `Pedido #${String(o.id).slice(-6)}`;
      document.getElementById("modalSub").textContent   = formatDate(o.data);

      document.getElementById("modalBody").innerHTML = `
        <!-- Info grid -->
        <div class="order-detail-grid">
          <div class="order-detail-box">
            <div class="order-detail-box__label">Cliente</div>
            <div class="order-detail-box__val">
              <strong>${o.cliente?.nome || "—"}</strong><br>
              ${o.cliente?.tel || ""}
            </div>
          </div>
          <div class="order-detail-box">
            <div class="order-detail-box__label">Entrega</div>
            <div class="order-detail-box__val">${o.entrega?.endereco || "Retirada no local"}</div>
          </div>
          <div class="order-detail-box">
            <div class="order-detail-box__label">Pagamento</div>
            <div class="order-detail-box__val">
              <strong>${o.pagamento?.label || "—"}</strong>
              ${o.pagamento?.troco ? `<br><span style="font-size:12px;color:var(--adm-muted)">Troco para R$ ${o.pagamento.troco}</span>` : ""}
            </div>
          </div>
          <div class="order-detail-box">
            <div class="order-detail-box__label">Status atual</div>
            <div class="order-detail-box__val">${statusBadge(o.status)}</div>
          </div>
        </div>

        ${o.obs ? `
        <div class="order-detail-box" style="margin-bottom:14px">
          <div class="order-detail-box__label">Observações</div>
          <div class="order-detail-box__val">${o.obs}</div>
        </div>` : ""}

        <!-- Itens -->
        <div style="font-size:12px;font-weight:700;color:var(--adm-muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px">Itens do pedido</div>
        <div class="order-items-list" style="margin-bottom:16px">
          ${(o.itens||[]).map(i => `
            <div class="order-item-row">
              <div style="flex:1">
                <div class="order-item-row__name">${i.qty}× ${i.nome}</div>
                <div class="order-item-row__opts">
                  ${i.tamanhoLabel && i.tamanhoLabel !== "Único" ? `Tamanho: ${i.tamanhoLabel}` : ""}
                  ${i.borda && i.borda !== "Sem borda recheada" ? ` · Borda: ${i.borda}` : ""}
                  ${i.adicionais?.length ? ` · Extras: ${i.adicionais.join(", ")}` : ""}
                  ${i.obs ? ` · Obs: ${i.obs}` : ""}
                </div>
              </div>
              <div class="order-item-row__price">${formatBRL(i.preco * i.qty)}</div>
            </div>`).join("")}
        </div>

        <!-- Total -->
        <div class="order-total-box">
          <div class="order-total-row">
            <span>Subtotal</span>
            <span>${formatBRL(o.subtotal||0)}</span>
          </div>
          <div class="order-total-row">
            <span>Taxa de entrega</span>
            <span>${o.frete === 0 ? "Grátis 🎉" : formatBRL(o.frete||0)}</span>
          </div>
          <div class="order-total-row order-total-row--main">
            <span>Total</span>
            <span>${formatBRL(o.total||0)}</span>
          </div>
        </div>`;

      document.getElementById("modalFooter").innerHTML = `
        <select class="status-select" id="modalStatusSel" style="max-width:180px">
          <option value="">Mudar status…</option>
          <option value="pendente">⏳ Pendente</option>
          <option value="preparando">👨‍🍳 Preparando</option>
          <option value="saiu">🛵 Saiu para entrega</option>
          <option value="entregue">✅ Entregue</option>
          <option value="cancelado">❌ Cancelado</option>
        </select>
        <button class="admin-btn admin-btn--primary" id="modalSaveStatus">Salvar status</button>
        <button class="admin-btn" onclick="closeModal()">Fechar</button>`;

      document.getElementById("modalSaveStatus").onclick = () => {
        const v = document.getElementById("modalStatusSel").value;
        if (!v) return showToast("Selecione um status.", "error");
        updateStatus(id, v);
        closeModal();
      };

      document.getElementById("modalOverlay").style.display = "flex";
    }

    function closeModal() { document.getElementById("modalOverlay").style.display = "none"; }

    /* ── events ── */
    document.getElementById("filterStatus").addEventListener("change", e => {
      filterVal = e.target.value; renderOrders();
    });

    document.getElementById("searchInput").addEventListener("input", e => {
      searchVal = e.target.value.trim(); renderOrders();
    });

    document.getElementById("btnClearOrders").addEventListener("click", () => {
      if (confirm("Apagar TODOS os pedidos? Esta ação não pode ser desfeita.")) {
        DB.saveOrders([]);
        renderOrders();
        showToast("Todos os pedidos foram apagados.");
      }
    });

    document.getElementById("btnLogout").addEventListener("click", () => {
      sessionStorage.removeItem("deliry_admin");
      window.location.href = "login.html";
    });

    /* ── preview ── */
    function openPreview() {
      document.getElementById("previewFrame").src = "../index.html";
      document.getElementById("previewOverlay").classList.add("open");
    }
    function setPreview(url, btn) {
      document.getElementById("previewFrame").src = url;
      document.querySelectorAll(".preview-nav-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }
    function closePreview() { document.getElementById("previewOverlay").classList.remove("open"); }
    document.getElementById("previewOverlay").addEventListener("click", e => {
      if (e.target === e.currentTarget) closePreview();
    });

    renderOrders();
  </script>
</body>
</html>
