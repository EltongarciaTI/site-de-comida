<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produto — Deliry Pizza</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/produto.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header__inner">
      <a class="back-btn" href="menu.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Cardápio
      </a>
      <a class="header__logo" href="index.html">
        <span class="logo-icon" id="hLogoIcon"></span>
        <span class="logo-name" id="hLogoName"></span>
      </a>
      <div class="header__actions">
        <a class="cart-btn" href="checkout.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span>Carrinho</span>
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </header>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="produto-page" id="produtoPage">

    <!-- FOTO + GALERIA -->
    <div class="produto-hero">
      <div class="produto-hero__img" id="produtoImg"></div>
      <div class="produto-hero__overlay"></div>
    </div>

    <!-- INFO + CONFIGURAÇÃO -->
    <div class="produto-body">
      <div class="produto-info">
        <div class="produto-info__badges" id="produtoBadges"></div>
        <h1 class="produto-info__name" id="produtoNome"></h1>
        <p class="produto-info__desc" id="produtoDesc"></p>
        <div class="produto-info__price" id="produtoPrice"></div>
      </div>

      <!-- TAMANHO -->
      <div class="produto-section" id="sectionTamanho" style="display:none">
        <h3 class="produto-section__title">Escolha o tamanho</h3>
        <div class="size-grid" id="sizeGrid"></div>
      </div>

      <!-- BORDA -->
      <div class="produto-section" id="sectionBorda" style="display:none">
        <h3 class="produto-section__title">
          Borda recheada
          <span class="produto-section__opt">opcional</span>
        </h3>
        <div class="option-list" id="bordaList"></div>
      </div>

      <!-- ADICIONAIS -->
      <div class="produto-section">
        <h3 class="produto-section__title">
          Adicionais
          <span class="produto-section__opt">opcional</span>
        </h3>
        <div class="option-list" id="adicionaisList"></div>
      </div>

      <!-- OBSERVAÇÕES -->
      <div class="produto-section">
        <h3 class="produto-section__title">Observações</h3>
        <textarea
          class="field-textarea obs-field"
          id="obsField"
          placeholder="Ex: sem cebola, bem passado, molho à parte..."
          rows="3"
          maxlength="200"
        ></textarea>
        <div class="obs-count"><span id="obsCount">0</span>/200</div>
      </div>

      <!-- QUANTIDADE + ADICIONAR -->
      <div class="produto-actions">
        <div class="qty-control">
          <button class="qty-btn" id="qtyMinus">−</button>
          <span class="qty-num" id="qtyNum">1</span>
          <button class="qty-btn" id="qtyPlus">+</button>
        </div>
        <button class="btn-add-cart" id="btnAddCart">
          Adicionar · <span id="btnPrice">R$ 0,00</span>
        </button>
      </div>
    </div>
  </div>

  <!-- NOT FOUND -->
  <div class="not-found" id="notFound" style="display:none">
    <div class="not-found__icon">😕</div>
    <h2>Produto não encontrado</h2>
    <a class="btn-primary" href="menu.html">Ver cardápio</a>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/produto.js"></script>
</body>
</html>
